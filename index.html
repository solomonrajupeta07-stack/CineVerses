<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineVerse 🎬</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>CineVerse 🎬</h1>
    <p id="statusText">Type your mood and get movie recommendations</p>
    
    <div class="search-container">
      <input type="text" id="moodInput" placeholder="How are you feeling? (e.g., I want to laugh)">
      <button onclick="detectMood()">Find Movies</button>
    </div>

    <div class="controls">
      <select id="languageSelect">
        <option value="">All Languages</option>
        <option value="English">English</option>
        <option value="Telugu">Telugu</option>
        <option value="Hindi">Hindi</option>
      </select>
      <button id="homeBtn" onclick="showAllMovies()">Reset to All 🏠</button>
    </div>
  </header>

  <div id="movieContainer"></div>

  <div id="movieModal" class="modal">
    <div class="modal-content">
      <span onclick="closeModal()" class="close">&times;</span>
      <div class="modal-body">
        <img id="modalPoster" src="" alt="Movie Poster">
        <div class="modal-info">
          <h2 id="modalTitle"></h2>
          <p id="modalRating"></p>
          <p id="modalOverview"></p>
        </div>
      </div>
    </div>
  </div>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <script src="script.js"></script>
</body>
</html>
